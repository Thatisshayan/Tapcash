<svg width="500" height="600" viewBox="0 0 500 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Character in hoodie with phone -->
  <g id="character">
    <!-- Body/Hoodie -->
    <ellipse cx="250" cy="450" rx="120" ry="140" fill="#6366F1" opacity="0.9"/>
    <path d="M130 380 Q250 320 370 380 L370 500 Q250 560 130 500 Z" fill="#4F46E5"/>
    
    <!-- Head -->
    <circle cx="250" cy="280" r="80" fill="#FCD34D"/>
    
    <!-- Hood -->
    <path d="M170 260 Q250 200 330 260 L330 320 Q250 280 170 320 Z" fill="#4338CA" opacity="0.8"/>
    
    <!-- Face details -->
    <circle cx="230" cy="270" r="8" fill="#1F2937"/>
    <circle cx="270" cy="270" r="8" fill="#1F2937"/>
    <path d="M230 300 Q250 310 270 300" stroke="#1F2937" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Phone in hand -->
    <rect x="200" y="400" width="60" height="100" rx="8" fill="#1F2937"/>
    <rect x="205" y="405" width="50" height="85" rx="4" fill="#10B981"/>
    <text x="230" y="455" font-size="24" fill="white" text-anchor="middle">$</text>
    
    <!-- Arm holding phone -->
    <ellipse cx="230" cy="380" rx="25" ry="40" fill="#FCD34D"/>
  </g>
  
  <!-- Floating gamepad -->
  <g id="gamepad" transform="translate(80, 150)">
    <rect x="0" y="20" width="80" height="50" rx="10" fill="#EF4444" opacity="0.9"/>
    <circle cx="20" cy="35" r="8" fill="#1F2937"/>
    <circle cx="60" cy="35" r="8" fill="#1F2937"/>
    <rect x="15" y="50" width="50" height="15" rx="7" fill="#DC2626"/>
    <!-- Floating animation hint -->
    <animateTransform attributeName="transform" type="translate" values="80,150; 80,140; 80,150" dur="3s" repeatCount="indefinite"/>
  </g>
  
  <!-- Floating dollar sign -->
  <g id="dollar" transform="translate(380, 200)">
    <circle cx="20" cy="20" r="25" fill="#10B981" opacity="0.9"/>
    <text x="20" y="30" font-size="32" fill="white" font-weight="bold" text-anchor="middle">$</text>
    <animateTransform attributeName="transform" type="translate" values="380,200; 380,190; 380,200" dur="2.5s" repeatCount="indefinite"/>
  </g>
  
  <!-- Floating gem -->
  <g id="gem" transform="translate(400, 380)">
    <polygon points="20,5 35,20 20,35 5,20" fill="#8B5CF6" opacity="0.9"/>
    <polygon points="20,5 35,20 20,20" fill="#A78BFA" opacity="0.7"/>
    <polygon points="20,20 35,20 20,35" fill="#7C3AED" opacity="0.7"/>
    <animateTransform attributeName="transform" type="translate" values="400,380; 400,370; 400,380" dur="2.8s" repeatCount="indefinite"/>
  </g>
  
  <!-- Sparkles -->
  <g id="sparkles" opacity="0.6">
    <circle cx="150" cy="250" r="3" fill="#FCD34D">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="300" r="3" fill="#FCD34D">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="400" r="3" fill="#FCD34D">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>

<!-- Made with Bob -->
