<svg width="300" height="600" viewBox="0 0 300 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone frame -->
  <rect x="10" y="10" width="280" height="580" rx="30" fill="#1F2937"/>
  <rect x="20" y="20" width="260" height="560" rx="25" fill="#111827"/>
  
  <!-- Status bar -->
  <rect x="20" y="20" width="260" height="40" fill="#1F2937"/>
  <text x="40" y="45" font-size="14" fill="white">9:41</text>
  <circle cx="250" cy="40" r="4" fill="#10B981"/>
  <rect x="260" y="36" width="15" height="8" rx="2" fill="white"/>
  
  <!-- Header -->
  <rect x="20" y="70" width="260" height="60" fill="#6366F1"/>
  <text x="150" y="105" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Offer Details</text>
  
  <!-- Offer card -->
  <rect x="30" y="150" width="240" height="120" rx="12" fill="#1F2937"/>
  
  <!-- Game icon -->
  <rect x="45" y="165" width="60" height="60" rx="8" fill="#DC2626"/>
  <text x="75" y="205" font-size="24" fill="white" text-anchor="middle">🎰</text>
  
  <!-- Offer info -->
  <text x="120" y="180" font-size="16" font-weight="bold" fill="white">Vegas Slots 777</text>
  <text x="120" y="200" font-size="12" fill="#9CA3AF">Play & Win Big</text>
  
  <!-- Reward badge -->
  <rect x="120" y="215" width="140" height="35" rx="8" fill="#10B981"/>
  <text x="190" y="238" font-size="18" font-weight="bold" fill="white" text-anchor="middle">+$5.00</text>
  
  <!-- Requirements section -->
  <rect x="30" y="290" width="240" height="150" rx="12" fill="#1F2937"/>
  <text x="45" y="315" font-size="14" font-weight="bold" fill="white">Requirements:</text>
  
  <g transform="translate(45, 330)">
    <circle cx="5" cy="5" r="4" fill="#10B981"/>
    <text x="20" y="10" font-size="12" fill="#D1D5DB">Download the app</text>
  </g>
  <g transform="translate(45, 355)">
    <circle cx="5" cy="5" r="4" fill="#10B981"/>
    <text x="20" y="10" font-size="12" fill="#D1D5DB">Complete tutorial</text>
  </g>
  <g transform="translate(45, 380)">
    <circle cx="5" cy="5" r="4" fill="#10B981"/>
    <text x="20" y="10" font-size="12" fill="#D1D5DB">Reach level 5</text>
  </g>
  <g transform="translate(45, 405)">
    <circle cx="5" cy="5" r="4" fill="#10B981"/>
    <text x="20" y="10" font-size="12" fill="#D1D5DB">Play for 10 minutes</text>
  </g>
  
  <!-- Time estimate -->
  <rect x="30" y="460" width="240" height="50" rx="12" fill="#374151"/>
  <text x="150" y="480" font-size="12" fill="#9CA3AF" text-anchor="middle">Estimated Time</text>
  <text x="150" y="500" font-size="16" font-weight="bold" fill="white" text-anchor="middle">15-20 minutes</text>
  
  <!-- Start button -->
  <rect x="40" y="530" width="220" height="50" rx="25" fill="#6366F1"/>
  <text x="150" y="560" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Start Offer</text>
  
  <!-- Home indicator -->
  <rect x="120" y="570" width="60" height="5" rx="2.5" fill="#4B5563"/>
</svg>

<!-- Made with Bob -->
