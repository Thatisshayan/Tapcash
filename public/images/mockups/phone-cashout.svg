<svg width="300" height="600" viewBox="0 0 300 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone frame -->
  <rect x="10" y="10" width="280" height="580" rx="30" fill="#1F2937"/>
  <rect x="20" y="20" width="260" height="560" rx="25" fill="#111827"/>
  
  <!-- Status bar -->
  <rect x="20" y="20" width="260" height="40" fill="#1F2937"/>
  <text x="40" y="45" font-size="14" fill="white">9:41</text>
  <circle cx="250" cy="40" r="4" fill="#10B981"/>
  <rect x="260" y="36" width="15" height="8" rx="2" fill="white"/>
  
  <!-- Header -->
  <rect x="20" y="70" width="260" height="60" fill="#10B981"/>
  <text x="150" y="105" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Cash Out</text>
  
  <!-- Balance card -->
  <rect x="30" y="150" width="240" height="100" rx="12" fill="linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%)"/>
  <defs>
    <linearGradient id="balanceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="30" y="150" width="240" height="100" rx="12" fill="url(#balanceGrad)"/>
  
  <text x="150" y="180" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">Available Balance</text>
  <text x="150" y="220" font-size="36" font-weight="bold" fill="white" text-anchor="middle">$47.50</text>
  
  <!-- Payment methods -->
  <text x="30" y="280" font-size="16" font-weight="bold" fill="white">Select Payment Method</text>
  
  <!-- PayPal option -->
  <rect x="30" y="300" width="240" height="70" rx="12" fill="#1F2937" stroke="#6366F1" stroke-width="2"/>
  <circle cx="60" cy="335" r="20" fill="#0070BA"/>
  <text x="60" y="342" font-size="16" font-weight="bold" fill="white" text-anchor="middle">P</text>
  <text x="100" y="330" font-size="16" font-weight="bold" fill="white">PayPal</text>
  <text x="100" y="350" font-size="12" fill="#9CA3AF">Instant transfer</text>
  <circle cx="245" cy="335" r="8" fill="#6366F1" stroke="white" stroke-width="2"/>
  
  <!-- Interac option -->
  <rect x="30" y="385" width="240" height="70" rx="12" fill="#1F2937"/>
  <circle cx="60" cy="420" r="20" fill="#FCD34D"/>
  <text x="60" y="427" font-size="16" font-weight="bold" fill="#1F2937" text-anchor="middle">e</text>
  <text x="100" y="415" font-size="16" font-weight="bold" fill="white">Interac e-Transfer</text>
  <text x="100" y="435" font-size="12" fill="#9CA3AF">1-2 business days</text>
  <circle cx="245" cy="420" r="8" fill="none" stroke="#4B5563" stroke-width="2"/>
  
  <!-- Amount input -->
  <text x="30" y="485" font-size="16" font-weight="bold" fill="white">Amount to Cash Out</text>
  <rect x="30" y="495" width="240" height="50" rx="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <text x="50" y="527" font-size="24" font-weight="bold" fill="white">$47.50</text>
  <text x="250" y="527" font-size="14" fill="#9CA3AF" text-anchor="end">MAX</text>
  
  <!-- Cash out button -->
  <rect x="40" y="560" width="220" height="50" rx="25" fill="#10B981"/>
  <text x="150" y="590" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Confirm Cash Out</text>
  
  <!-- Processing indicator -->
  <g opacity="0.8">
    <circle cx="150" y="585" r="3" fill="white">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Home indicator -->
  <rect x="120" y="570" width="60" height="5" rx="2.5" fill="#4B5563"/>
</svg>

<!-- Made with Bob -->
