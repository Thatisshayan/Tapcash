<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Slot machine -->
  <rect x="20" y="15" width="80" height="90" rx="8" fill="#DC2626"/>
  <rect x="25" y="20" width="70" height="50" rx="4" fill="#1F2937"/>
  
  <!-- Screen with 777 -->
  <rect x="30" y="25" width="60" height="40" rx="2" fill="#FEF3C7"/>
  <text x="60" y="52" font-size="24" font-weight="bold" fill="#DC2626" text-anchor="middle">777</text>
  
  <!-- Lever -->
  <rect x="95" y="40" width="8" height="30" rx="4" fill="#EF4444"/>
  <circle cx="99" cy="35" r="6" fill="#FCA5A5"/>
  
  <!-- Coin slot -->
  <rect x="45" y="75" width="30" height="4" rx="2" fill="#1F2937"/>
  
  <!-- Payout tray -->
  <path d="M30 85 L90 85 L85 100 L35 100 Z" fill="#FBBF24"/>
  
  <!-- Coins -->
  <circle cx="50" cy="95" r="4" fill="#FCD34D"/>
  <circle cx="60" cy="95" r="4" fill="#FCD34D"/>
  <circle cx="70" cy="95" r="4" fill="#FCD34D"/>
  
  <!-- Lights -->
  <circle cx="35" cy="10" r="3" fill="#FCD34D">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="10" r="3" fill="#FCD34D">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="85" cy="10" r="3" fill="#FCD34D">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="0.8s" repeatCount="indefinite"/>
  </circle>
</svg>

